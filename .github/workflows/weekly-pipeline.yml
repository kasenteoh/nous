name: weekly-pipeline

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      since:
        description: "Ingest: optional start date (YYYY-MM-DD). Default: rolling 7-day window with overlap."
        required: false
        type: string
      until:
        description: "Ingest: optional end date (YYYY-MM-DD). Default: today."
        required: false
        type: string
      resolve_refetch_after_days:
        description: "Resolve: re-resolve companies whose website_resolved_at is older than N days. 0 = re-resolve everything. Default: 90."
        required: false
        type: string
      skip_ingest:
        description: "Skip the Ingest filings stage. Useful when you just want to re-run scrape/enrich on existing data."
        required: false
        type: boolean
        default: false
      skip_resolve:
        description: "Skip the Resolve homepages stage."
        required: false
        type: boolean
        default: false
      skip_scrape:
        description: "Skip the Scrape homepages stage."
        required: false
        type: boolean
        default: false
      skip_enrich:
        description: "Skip the Enrich companies stage."
        required: false
        type: boolean
        default: false
      skip_news:
        description: "Skip the Ingest news stage (M3)."
        required: false
        type: boolean
        default: false
      skip_funding:
        description: "Skip the Extract funding stage (M3)."
        required: false
        type: boolean
        default: false
      news_lookback_days:
        description: "Ingest news: lookback window in days. Default: 7."
        required: false
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Ingest filings
        if: ${{ inputs.skip_ingest != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.since }}" ]; then ARGS+=(--since "${{ inputs.since }}"); fi
          if [ -n "${{ inputs.until }}" ]; then ARGS+=(--until "${{ inputs.until }}"); fi
          uv run nous ingest-filings "${ARGS[@]}"

      - name: Resolve homepages
        if: ${{ inputs.skip_resolve != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.resolve_refetch_after_days }}" ]; then
            ARGS+=(--refetch-after-days "${{ inputs.resolve_refetch_after_days }}")
          fi
          uv run nous resolve-homepages "${ARGS[@]}"

      - name: Scrape homepages
        if: ${{ inputs.skip_scrape != true }}
        run: uv run nous scrape-homepages

      - name: Enrich companies
        if: ${{ inputs.skip_enrich != true }}
        # --limit 800 keeps us under Gemini's free tier (~1500 req/day) with headroom.
        # continue-on-error so a Gemini quota exhaustion doesn't fail the whole run —
        # the next weekly run picks up the unfinished companies.
        run: uv run nous enrich-companies --limit 800
        continue-on-error: true

      - name: Ingest news
        if: ${{ inputs.skip_news != true }}
        # Per-company Google News RSS + TechCrunch venture-tag broad sweep.
        # continue-on-error: a transient Google News block shouldn't fail the run.
        run: |
          ARGS=()
          if [ -n "${{ inputs.news_lookback_days }}" ]; then
            ARGS+=(--lookback-days "${{ inputs.news_lookback_days }}")
          fi
          uv run nous ingest-news "${ARGS[@]}"
        continue-on-error: true

      - name: Extract funding
        if: ${{ inputs.skip_funding != true }}
        # --limit 1000 is the M3 weekly Gemini budget (~1500/day × 7 = 10,500
        # headroom; we reserve the rest for M4 competitor analysis later).
        # continue-on-error per the same rate-limit logic as enrich-companies.
        run: uv run nous extract-funding --limit 1000
        continue-on-error: true

      # Note: Vercel deploy-hook POST is deferred to M6 per spec §9.
      # Note: refresh-vc-portfolios runs on its own monthly cron (see
      # monthly-vc-refresh.yml) — VC sites change slowly enough that monthly
      # is the right cadence, and it keeps the weekly run lean.

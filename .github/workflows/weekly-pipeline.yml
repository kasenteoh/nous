name: weekly-pipeline

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      since:
        description: "Optional start date (YYYY-MM-DD). Default: rolling 7-day window with overlap."
        required: false
        type: string
      until:
        description: "Optional end date (YYYY-MM-DD). Default: today."
        required: false
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Ingest filings
        run: |
          ARGS=()
          if [ -n "${{ inputs.since }}" ]; then ARGS+=(--since "${{ inputs.since }}"); fi
          if [ -n "${{ inputs.until }}" ]; then ARGS+=(--until "${{ inputs.until }}"); fi
          uv run nous ingest-filings "${ARGS[@]}"

      - name: Resolve homepages
        run: uv run nous resolve-homepages

      - name: Scrape homepages
        run: uv run nous scrape-homepages

      - name: Enrich companies
        # --limit 800 keeps us under Gemini's free tier (~1500 req/day) with headroom.
        # continue-on-error so a Gemini quota exhaustion doesn't fail the whole run —
        # the next weekly run picks up the unfinished companies.
        run: uv run nous enrich-companies --limit 800
        continue-on-error: true

      # Note: Vercel deploy-hook POST is deferred to M6 per spec §9.

name: verify-sources

# Manual lever for the source-verification husk gate, against the production DB.
# No local environment holds DATABASE_URL or the DeepSeek key, so Actions is the
# only place this runs against real companies.
#
# Two phases, measure-first:
#   1. verify-sources-probe ($0, always) — a prevalence census: how many rendered
#      facts carry a source_url, bucketed stored / refetch / unreachable. Sizes
#      the addressable set + scraping load before any spend.
#   2. verify-sources --dry-run (PAID, only when run_dry_run=true) — verifies a
#      bounded, prominence-ordered slice of stored-text facts against DeepSeek and
#      prints the support/unsupported/uncertain rate, the fabrication proxy, and
#      the $/fact. Writes nothing (the fact_verifications apply path — migration
#      0043 — is not built yet; dispatching the apply mode fails loudly).
#
# The exact spend is printed by observability.emit_run_telemetry in the step
# summary. This is the ONE owner-approved PAID line beyond enrichment /
# talent-flow — hence DEEPSEEK_API_KEY in env for the dry-run phase.
#
# Example (probe only — $0):        gh workflow run verify-sources.yml
# Example (probe + 25-fact dry run): gh workflow run verify-sources.yml -f run_dry_run=true -f limit=25

on:
  workflow_dispatch:
    inputs:
      run_dry_run:
        description: "Also run the PAID DeepSeek verification dry-run (measures, writes nothing)."
        required: false
        type: boolean
        default: false
      run_apply:
        description: "Run the PAID DeepSeek verification in APPLY mode (upserts verdicts to fact_verifications)."
        required: false
        type: boolean
        default: false
      limit:
        description: "Max facts the dry-run / apply verifies (bounds LLM spend)."
        required: false
        type: string
        default: "25"

permissions:
  contents: read

# The apply path will write fact_verifications — serialize with every other
# DB-touching workflow (the cron, discovery, ops) even though probe + dry-run
# only read, so it never contends for the free-tier connection pool.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  verify-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # The PAID line: the dry-run calls DeepSeek per fact. The key lives only in
      # Actions secrets (never locally), the same as enrichment.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install dependencies
        run: uv sync

      - name: Apply migrations
        # Keeps prod at head before the run. Safe: only migrations already merged
        # to the default branch exist in this checkout.
        run: uv run alembic upgrade head

      - name: Prevalence probe ($0)
        run: uv run nous verify-sources-probe

      - name: Verification dry-run (paid)
        # Only when explicitly requested. Inputs pass through env vars (never
        # string-interpolated into the script). pipefail so a failing `uv run`
        # surfaces as a failed step.
        if: ${{ inputs.run_dry_run }}
        env:
          OP_LIMIT: ${{ inputs.limit }}
        run: |
          set -o pipefail
          uv run nous verify-sources --dry-run --limit "${OP_LIMIT:-25}"

      - name: Verification apply (paid, persists)
        # Upserts verdicts into fact_verifications (idempotent). Only when
        # explicitly requested; start with a small --limit and widen once clean.
        if: ${{ inputs.run_apply }}
        env:
          OP_LIMIT: ${{ inputs.limit }}
        run: |
          set -o pipefail
          uv run nous verify-sources --limit "${OP_LIMIT:-25}"

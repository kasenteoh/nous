name: descriptions

# Weekly description pipeline: resolve + scrape company homepages, then run the
# enrichment LLM to write descriptions / people / categories. enrich-companies
# is write-once (it only touches companies missing a description, or past the
# refetch window), so this is cheap to run weekly — steady state it only
# processes newly discovered companies.
on:
  schedule:
    # Mon 06:00 UTC, after discovery.yml (Mon 02:00) so companies created that
    # morning get scraped + enriched the same day. Serialized against the other
    # DB-mutating workflows via the shared `concurrency` group below.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      resolve_refetch_after_days:
        description: "Resolve: re-resolve companies whose website_resolved_at is older than N days. 0 = re-resolve everything. Default: 90."
        required: false
        type: string
      scrape_refetch_after_days:
        description: "Scrape: re-scrape companies whose raw_pages are older than N days. 0 = re-scrape everything. Default: 90."
        required: false
        type: string
      skip_resolve:
        description: "Skip the Resolve homepages stage."
        required: false
        type: boolean
        default: false
      skip_scrape:
        description: "Skip the Scrape homepages stage."
        required: false
        type: boolean
        default: false
      skip_enrich:
        description: "Skip the Enrich companies stage."
        required: false
        type: boolean
        default: false
      skip_estimate:
        description: "Skip the Estimate employees stage."
        required: false
        type: boolean
        default: false

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). resolve + enrich UPDATE company rows, which would race the
# dedup DELETEs in discovery.yml. cancel-in-progress: false so a queued run
# waits its turn.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  descriptions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # GitHub REST API token for the estimate-employees github-org signal.
      # The built-in Actions token — no secret to provision.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          # Playwright caches Chromium under ~/.cache/ms-playwright. Pinning
          # by playwright version in pyproject.toml gives a clean cache-busting
          # signal whenever we bump the dep.
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pipeline/uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # `--with-deps` would also install OS-level libs (libnss3 etc.) but
        # GitHub-hosted ubuntu-latest already ships them, so skip the apt step.
        run: uv run playwright install chromium

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Resolve homepages
        if: ${{ inputs.skip_resolve != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.resolve_refetch_after_days }}" ]; then
            ARGS+=(--refetch-after-days "${{ inputs.resolve_refetch_after_days }}")
          fi
          uv run nous resolve-homepages "${ARGS[@]}"

      - name: Scrape homepages
        if: ${{ inputs.skip_scrape != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.scrape_refetch_after_days }}" ]; then
            ARGS+=(--refetch-after-days "${{ inputs.scrape_refetch_after_days }}")
          fi
          uv run nous scrape-homepages "${ARGS[@]}"

      - name: Enrich companies
        if: ${{ inputs.skip_enrich != true }}
        # --limit 800 caps per-run LLM spend (DeepSeek is paid). continue-on-error
        # so a provider rate-limit / 5xx doesn't fail the whole run — the next
        # weekly run picks up the unfinished companies.
        run: uv run nous enrich-companies --limit 800
        continue-on-error: true

      - name: Estimate employees
        if: ${{ inputs.skip_estimate != true }}
        # Best-effort headcount probing across public sources (Wellfound, The Org,
        # GrowJo, careers-page job count, GitHub org). continue-on-error so a
        # blocked source / rate-limit doesn't fail the run; the 90-day back-off
        # (employee_count_checked_at) keeps steady-state cost low.
        run: uv run nous estimate-employees
        continue-on-error: true

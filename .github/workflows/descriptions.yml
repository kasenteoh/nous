name: descriptions

# Daily description pipeline: resolve missing homepages, scrape company sites,
# then run the enrichment LLM to write descriptions / people / categories.
#
# Why daily + bounded instead of weekly + unbounded: GitHub-hosted runners
# kill jobs at 360 minutes. The 2026-06-11 weekly runs spent all 6 hours
# inside resolve-homepages and were cancelled before scrape/enrich ever ran
# (runs 27360677547 and 27362752046), which is why production had zero
# descriptions. Every stage below now gets an explicit --limit and/or
# --max-runtime-minutes budget and exits cleanly when it's spent; per-company
# commits + write-once timestamps make each stage resume exactly where the
# previous run stopped. The scrape backlog (~2.3k companies) drains over
# ~2 weeks of daily runs, after which the steady-state run only touches newly
# discovered companies and finishes in minutes.
#
# Budget math (repo is private: 2,000 free Actions min/month — keep the
# worst-case day well under ~80 min):
#   setup            ~2 min
#   resolve          ≤10 min (--max-runtime-minutes 10, backlog ~240 then ~0)
#   scrape           ≤30 min (--max-runtime-minutes 30, ~150-250 companies/run)
#   enrich           ≤45 min (--limit 250, DeepSeek-bound ~5-15s/company;
#                             in practice bounded by yesterday's scrape yield)
#   job timeout      150 min (hard backstop, should never be hit)
on:
  schedule:
    # Daily 06:00 UTC. On Mondays this lands after discovery.yml (02:00) so
    # companies created that morning get scraped + enriched the same day.
    # Serialized against the other DB-mutating workflows via the shared
    # `concurrency` group below; bounded budgets keep this job ≤~1.5h so the
    # 14:00 funding-news cron is never starved.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      resolve_limit:
        description: "Resolve: max companies to attempt. Default: 200."
        required: false
        type: string
      scrape_limit:
        description: "Scrape: max companies to scrape. Default: 250."
        required: false
        type: string
      enrich_limit:
        description: "Enrich: max companies to enrich (caps LLM spend). Default: 250."
        required: false
        type: string
      resolve_refetch_after_days:
        description: "Resolve: re-attempt website-less companies whose website_resolved_at is older than N days. 0 = re-attempt all website-less companies. Default: 90."
        required: false
        type: string
      scrape_refetch_after_days:
        description: "Scrape: re-scrape companies whose raw_pages are older than N days. 0 = re-scrape everything. Default: 90."
        required: false
        type: string
      skip_resolve:
        description: "Skip the Resolve homepages stage."
        required: false
        type: boolean
        default: false
      skip_scrape:
        description: "Skip the Scrape homepages stage."
        required: false
        type: boolean
        default: false
      skip_enrich:
        description: "Skip the Enrich companies stage."
        required: false
        type: boolean
        default: false

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). resolve + enrich UPDATE company rows, which would race the
# dedup DELETEs in discovery.yml. cancel-in-progress: false so a queued run
# waits its turn.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  descriptions:
    runs-on: ubuntu-latest
    # Hard backstop far below GitHub's 360-min kill. The per-stage budgets
    # below mean a healthy run finishes in well under an hour; hitting this
    # timeout indicates a hung stage, and the next daily run resumes cleanly.
    timeout-minutes: 150
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          # Playwright caches Chromium under ~/.cache/ms-playwright. Pinning
          # by playwright version in pyproject.toml gives a clean cache-busting
          # signal whenever we bump the dep.
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pipeline/uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # `--with-deps` would also install OS-level libs (libnss3 etc.) but
        # GitHub-hosted ubuntu-latest already ships them, so skip the apt step.
        run: uv run playwright install chromium

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Repair catalog (idempotent; no-op after first run)
        id: repair
        timeout-minutes: 15
        continue-on-error: true
        # One-time data repair: strips Lightspeed fund-badge text from names,
        # drops/excludes India-only holdings, resets parked-domain enrichments.
        # Idempotent, so leaving it in the daily run is harmless — it selects
        # nothing once the backlog is clean. Runs right after migrations so the
        # exclusion columns exist before any stage reads them.
        run: uv run nous repair-catalog

      # Every stage below is continue-on-error + step-timeout'd so one stage
      # failing or hanging never blocks the later ones — the original failure
      # mode was enrich never being reached because resolve ate the whole job.
      # Idempotent stages make "skip today, catch up tomorrow" safe.

      - name: Resolve homepages
        id: resolve
        if: ${{ inputs.skip_resolve != true }}
        timeout-minutes: 20
        continue-on-error: true
        run: |
          LIMIT="${{ inputs.resolve_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=200; fi
          ARGS=(--limit "$LIMIT" --max-runtime-minutes 10)
          if [ -n "${{ inputs.resolve_refetch_after_days }}" ]; then
            ARGS+=(--refetch-after-days "${{ inputs.resolve_refetch_after_days }}")
          fi
          uv run nous resolve-homepages "${ARGS[@]}"

      - name: Scrape homepages
        id: scrape
        if: ${{ inputs.skip_scrape != true }}
        timeout-minutes: 45
        continue-on-error: true
        run: |
          LIMIT="${{ inputs.scrape_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=250; fi
          ARGS=(--limit "$LIMIT" --max-runtime-minutes 30)
          if [ -n "${{ inputs.scrape_refetch_after_days }}" ]; then
            ARGS+=(--refetch-after-days "${{ inputs.scrape_refetch_after_days }}")
          fi
          uv run nous scrape-homepages "${ARGS[@]}"

      - name: Enrich companies
        id: enrich
        if: ${{ inputs.skip_enrich != true }}
        # --limit caps per-run LLM spend (DeepSeek is paid). continue-on-error
        # so a provider rate-limit / 5xx doesn't fail the whole run — the next
        # daily run picks up the unfinished companies.
        timeout-minutes: 60
        continue-on-error: true
        run: |
          LIMIT="${{ inputs.enrich_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=250; fi
          uv run nous enrich-companies --limit "$LIMIT"

      - name: Judge eligibility (backfill; drains at 200/day then no-ops)
        id: judge
        timeout-minutes: 30
        continue-on-error: true
        # Backfills the is-this-a-startup / non-US judgment onto companies
        # enriched before that judgment existed (~1,600 one-time DeepSeek calls
        # at --limit 200/day). Each judged row is stamped, so steady state
        # selects nothing.
        run: uv run nous judge-eligibility --limit 200

      - name: Database stats
        # No step id — contains(steps.*.outcome, ...) on the Trigger step only
        # sees id'd steps; leaving this id-free means it cannot accidentally
        # affect deploy gating.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous db-stats

      - name: Trigger Vercel deploy
        # contains(steps.*.outcome, ...) covers every id'd step; only pipeline
        # stages carry ids in this file — keep it that way or scope this back
        # to an explicit list.
        if: ${{ !cancelled() && contains(steps.*.outcome, 'success') }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy hook."
            exit 0
          fi
          curl -fsS -m 30 --retry 3 -o /dev/null -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            && echo "Vercel deploy hook triggered." \
            || echo "::warning::Vercel deploy hook POST failed (non-fatal)"

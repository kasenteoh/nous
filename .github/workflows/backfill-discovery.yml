name: backfill-discovery

# On-demand only. Runs the two company-discovery stages — VC portfolio refresh
# and news ingestion (which includes the TechCrunch venture-feed broad sweep) —
# so you can populate companies discovered from VC sites + TechCrunch without
# waiting for the weekly/monthly crons. Idempotent: re-running creates no
# duplicate rows (everything routes through auto_create_company).
on:
  workflow_dispatch:
    inputs:
      firms:
        description: "VC: optional comma-separated firm slugs (e.g. 'yc,a16z'). Default: all 7."
        required: false
        type: string
      similarity_threshold:
        description: "VC/news: pg_trgm fuzzy-match threshold. Default: Settings (0.85)."
        required: false
        type: string
      news_lookback_days:
        description: "News/TechCrunch: lookback window in days. Default: 30."
        required: false
        type: string
        default: "30"
      skip_vc:
        description: "Skip the VC portfolio refresh stage."
        required: false
        type: boolean
        default: false
      skip_news:
        description: "Skip the news ingestion (incl. TechCrunch) stage."
        required: false
        type: boolean
        default: false

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). This job auto-creates companies, so it must not race the dedup
# DELETEs in discovery.yml. cancel-in-progress: false so a queued run waits.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  backfill-discovery:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings). VC refresh
      # doesn't need it, but the TechCrunch sweep in ingest-news now uses the
      # LLM to identify the funded company from each headline.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Refresh VC portfolios
        if: ${{ inputs.skip_vc != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.firms }}" ]; then
            IFS=',' read -ra FIRMS <<< "${{ inputs.firms }}"
            for firm in "${FIRMS[@]}"; do
              ARGS+=(--firm "$firm")
            done
          fi
          if [ -n "${{ inputs.similarity_threshold }}" ]; then
            ARGS+=(--similarity-threshold "${{ inputs.similarity_threshold }}")
          fi
          uv run nous refresh-vc-portfolios "${ARGS[@]}"

      - name: Ingest news (incl. TechCrunch broad sweep)
        if: ${{ inputs.skip_news != true }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.news_lookback_days }}" ]; then
            ARGS+=(--lookback-days "${{ inputs.news_lookback_days }}")
          fi
          uv run nous ingest-news "${ARGS[@]}"

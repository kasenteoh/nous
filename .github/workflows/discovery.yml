name: discovery

# Weekly company discovery + refresh: pull new startups from VC portfolios,
# collapse duplicates, (re)compute competitor sets, then probe employee
# counts. Moved from monthly to weekly so new companies surface sooner —
# discovery itself is LLM-free and competitor analysis is TTL-gated (25 days),
# so weekly costs little more than monthly did.
#
# estimate-employees lives here (weekly) rather than in the 10x/day
# pipeline.yml: at ~15-30s/company across up to 5 sources it is the most
# expensive stage per company for the least time-sensitive data, and the
# private-repo Actions quota (2,000 min/month) can't fund it daily while the
# scrape backlog drains. Its 90-day back-off + --max-runtime-minutes budget
# keep the weekly cost bounded; bump the limit via workflow_dispatch to drain
# its backlog faster once the quota frees up.
on:
  schedule:
    # Mon 02:00 UTC. The dedup-companies step DELETEs merged company rows, so
    # this job must never run concurrently with pipeline.yml /
    # backfill-discovery.yml — they all write the companies table. That mutual
    # exclusion is enforced by the shared `concurrency` group below, not by cron
    # offsets.
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      firms:
        description: "Optional comma-separated firm slugs (e.g. 'yc,a16z'). Default: all 7."
        required: false
        type: string
      similarity_threshold:
        description: "Optional pg_trgm threshold for fuzzy match. Default: Settings.COMPANY_FUZZY_MATCH_THRESHOLD (0.85)."
        required: false
        type: string
      competitor_limit:
        description: "Max companies analyze-competitors will process this run. Default: 500."
        required: false
        type: string
      estimate_limit:
        description: "Max companies estimate-employees will probe this run. Default: 200."
        required: false
        type: string
      skip_estimate:
        description: "Skip the Estimate employees stage."
        required: false
        type: boolean
        default: false

# Serialize against every other workflow that mutates the companies table.
# dedup-companies (below) DELETEs merged rows; an overlapping run elsewhere
# would crash with a StaleDataError. cancel-in-progress: false so a queued run
# waits its turn instead of being dropped.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    # Hard backstop far below GitHub's 360-min kill (the 2026-06-11 runs died
    # there). VC refresh + dedup + TTL-gated competitors + budgeted estimate
    # finish in well under an hour on a normal week.
    timeout-minutes: 150
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # GitHub REST API token for the estimate-employees github-org signal.
      # The built-in Actions token — no secret to provision.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Refresh VC portfolios
        id: refresh
        run: |
          ARGS=()
          if [ -n "${{ inputs.firms }}" ]; then
            IFS=',' read -ra FIRMS <<< "${{ inputs.firms }}"
            for firm in "${FIRMS[@]}"; do
              ARGS+=(--firm "$firm")
            done
          fi
          if [ -n "${{ inputs.similarity_threshold }}" ]; then
            ARGS+=(--similarity-threshold "${{ inputs.similarity_threshold }}")
          fi
          uv run nous refresh-vc-portfolios "${ARGS[@]}"

      - name: Deduplicate companies
        id: dedup
        # Runs after discovery so competitor analysis works on de-duplicated
        # rows. Exact-domain merges need no LLM; fuzzy candidates use DeepSeek.
        run: uv run nous dedup-companies

      - name: Analyze competitors
        id: competitors
        timeout-minutes: 60
        continue-on-error: true
        run: |
          LIMIT="${{ inputs.competitor_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=500; fi
          uv run nous analyze-competitors --limit "$LIMIT"

      - name: Estimate employees
        id: estimate
        if: ${{ inputs.skip_estimate != true }}
        # Best-effort headcount probing across public sources (Wellfound, The
        # Org, GrowJo, careers-page job count, GitHub org). continue-on-error
        # so a blocked source / rate-limit doesn't fail the run; the 90-day
        # back-off (employee_count_checked_at) + the budget below keep the
        # weekly cost bounded while the backlog drains at ~200/week.
        timeout-minutes: 45
        continue-on-error: true
        run: |
          LIMIT="${{ inputs.estimate_limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=200; fi
          uv run nous estimate-employees --limit "$LIMIT" --max-runtime-minutes 30

      - name: Snapshot companies
        # No step id (deliberately): the deploy-hook gate below keys on
        # contains(steps.*.outcome, 'success') over id'd steps only, and a
        # snapshot is a side-channel time-series write, not a discovery stage —
        # it must not influence whether we trigger a deploy. continue-on-error
        # so a snapshot hiccup never fails the run; the weekly cadence means a
        # missed week is a single absent data point, recoverable via
        # `snapshot-companies --week`. One set-based upsert -> finishes fast.
        if: ${{ !cancelled() }}
        timeout-minutes: 10
        continue-on-error: true
        run: uv run nous snapshot-companies

      - name: Database stats
        # No step id — contains(steps.*.outcome, ...) on the Trigger step only
        # sees id'd steps; leaving this id-free means it cannot accidentally
        # affect deploy gating.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous db-stats

      - name: Trigger Vercel deploy
        # contains(steps.*.outcome, ...) covers every id'd step; only pipeline
        # stages carry ids in this file — keep it that way or scope this back
        # to an explicit list.
        if: ${{ !cancelled() && contains(steps.*.outcome, 'success') }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy hook."
            exit 0
          fi
          curl -fsS -m 30 --retry 3 -o /dev/null -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            && echo "Vercel deploy hook triggered." \
            || echo "::warning::Vercel deploy hook POST failed (non-fatal)"

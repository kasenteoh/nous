name: pipeline

# Consolidated scraping pipeline — funding news + company descriptions — run
# 8x/day (every 3h). Replaces the separate daily descriptions.yml + funding-news.yml.
#
# One workflow (not two) keeps the cadence to a single cron + a single deploy
# gate and shares the Playwright cache across runs.
#
# The repo is PUBLIC, so GitHub-hosted Actions minutes are FREE and unlimited —
# the old private-repo 2,000-min/mo quota no longer binds. The remaining bounds
# are per-run wall clock, DeepSeek $ (each LLM stage is --limit-capped; cost
# shows in the telemetry step summary), and scraping politeness (1 req/sec per
# domain). The conservative per-run --limits below were sized for the old quota
# and can now be raised to drain backlogs faster.
#
# Why frequent runs stay cheap regardless: every stage is idempotent and resumes
# where the last run stopped (per-company commits + write-once timestamps + the
# `processed` flag), so repeated runs re-pay almost nothing —
#   * ingest-news only LLM-identifies *new* TechCrunch articles and stores Google
#     News headlines for the per-company rotation (least-recently-checked first);
#   * extract-funding only touches unprocessed articles;
#   * enrich-companies is write-once per company.
# The initial backlog drains in a few days thanks to the concurrent fetch in
# resolve/scrape (--concurrency); steady-state runs then no-op in minutes.
on:
  schedule:
    # 8x/day, every 3h. Serialized against discovery.yml (weekly Mon 02:00) via
    # the shared `concurrency` group; on Mondays the 00:00/03:00 runs queue
    # behind discovery (cancel-in-progress: false → they wait, never drop).
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:
    inputs:
      overrides:
        description: >-
          JSON object of stage overrides, e.g.
          {"skip_news": true, "enrich_limit": "50", "run_repair_dupes": true}.
          Empty/omitted = exact cron behavior. Valid keys (see the "Resolve
          overrides" step for the enforced allowlist + each stage for
          defaults): skip_news, skip_funding, skip_resolve, skip_scrape,
          skip_enrich, news_limit, news_lookback_days, funding_limit,
          website_funding_limit, website_ignore_recheck, resolve_limit,
          scrape_limit, enrich_limit, judge_limit, run_funding_backfill,
          run_requery_totals, run_repair_dupes, repair_dupes_apply,
          run_enrich_backfill, enrich_backfill_limit, run_rejudge_nonstartup,
          run_infer_country, infer_country_apply, infer_country_limit.
          Unknown keys or malformed JSON FAIL the run loudly (a typo that
          silently ran cron defaults would still displace the queued cron).
        required: false
        type: string
        default: "{}"

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). resolve / enrich UPDATE company rows and ingest-news /
# extract-funding INSERT them, all of which race the dedup DELETEs in
# discovery.yml. cancel-in-progress: false so a queued run waits its turn — and
# so two pipeline runs (10x/day) never overlap each other either.
permissions:
  contents: read
  # The failure-alert step opens/comments the deduped pipeline-failure issue.
  issues: write

concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Hard backstop. The per-stage --limit / --max-runtime budgets keep a
    # healthy run well under this; hitting it means a stage hung, and the next
    # run (≤~2.4h later) resumes cleanly. Far below GitHub's 360-min kill.
    # Raised 30 → 45 with W-F: the enrich step alone may legitimately run 25
    # minutes (two-call flow + --redescribe-outdated), and the 2026-07-11
    # 13:15/15:54 crons were killed at this backstop while news/funding also
    # ran. Stages are stamped/resumable, so a kill loses little — but a healthy
    # full run must fit inside the budget, not race it.
    timeout-minutes: 45
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install pipeline dependencies
        # --group embeddings adds fastembed (onnxruntime CPU) for the
        # embed-companies step below; it is an optional group so the default
        # `uv sync` everywhere else (lint, discovery, local dev) stays light.
        run: uv sync --group embeddings

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          # Playwright caches Chromium under ~/.cache/ms-playwright. Pinning by
          # the lockfile gives a clean cache-busting signal on dep bumps. The
          # restore-key keeps the cache warm across the 10 daily runs so only
          # the first run after a bump re-downloads Chromium.
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pipeline/uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # `--with-deps` would also install OS-level libs (libnss3 etc.) but
        # GitHub-hosted ubuntu-latest already ships them, so skip the apt step.
        run: uv run playwright install chromium

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          # The embed-companies stage downloads bge-small-en-v1.5 (~130MB,
          # ONNX) into EMBEDDING_CACHE_DIR on first use. The model files for a
          # given name are immutable, so a fixed key never needs busting —
          # only the first run after this lands pays the download.
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-bge-small-en-v1.5

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Resolve overrides
        # Flattens the single `overrides` JSON dispatch input into OV_* env
        # vars for every later step (OV_SKIP_NEWS, OV_ENRICH_LIMIT, ...).
        # Replaced the 24 individual workflow_dispatch inputs (GitHub caps a
        # workflow at 25 — a new knob is now just an allowlist entry here, not
        # a displaced input). Cron runs carry no input → no OV_ vars → every
        # step takes its inline default, byte-identical to the old behavior.
        # FAIL-LOUD validation: malformed JSON, an unknown key (typo), or a
        # non-scalar/unsafe value kills the run — a dispatch that silently
        # fell back to cron defaults would still have displaced the queued
        # cron, wasting the slot on the wrong work. Values are restricted to
        # booleans/numbers/short safe strings so a value can never smuggle a
        # newline into GITHUB_ENV (env-injection guard).
        env:
          OVERRIDES: ${{ inputs.overrides || '{}' }}
        run: |
          set -euo pipefail
          ALLOWED='["skip_news","skip_funding","skip_resolve","skip_scrape",
            "skip_enrich","news_limit","news_lookback_days","funding_limit",
            "website_funding_limit","website_ignore_recheck","resolve_limit",
            "scrape_limit","enrich_limit","judge_limit","run_funding_backfill",
            "run_requery_totals","run_repair_dupes","repair_dupes_apply",
            "run_enrich_backfill","enrich_backfill_limit",
            "run_rejudge_nonstartup","run_infer_country","infer_country_apply",
            "infer_country_limit"]'
          if ! echo "$OVERRIDES" | jq -e 'type == "object"' >/dev/null 2>&1; then
            echo "::error::overrides is not a JSON object: $OVERRIDES"
            exit 1
          fi
          UNKNOWN=$(echo "$OVERRIDES" | jq -r --argjson allowed "$ALLOWED" \
            '(keys - $allowed) | join(", ")')
          if [ -n "$UNKNOWN" ]; then
            echo "::error::unknown override key(s): $UNKNOWN"
            exit 1
          fi
          if ! echo "$OVERRIDES" | jq -e \
            'all(.[]; (type == "boolean") or (type == "number")
                 or (type == "string" and test("^[A-Za-z0-9_.-]{0,40}$")))' \
            >/dev/null; then
            echo "::error::override values must be booleans, numbers, or short plain strings"
            exit 1
          fi
          echo "$OVERRIDES" | jq -r \
            'to_entries[] | "OV_\(.key | ascii_upcase)=\(.value)"' >> "$GITHUB_ENV"
          echo "resolved overrides: $OVERRIDES"

      # Every stage below is continue-on-error so one stage failing or hanging
      # never blocks the later ones — idempotent stages make "skip now, catch up
      # next run" safe. Stages carry an `id` so the deploy gate at the bottom
      # (contains(steps.*.outcome, 'success')) can see them; db-stats and the
      # deploy step are intentionally id-free so they can't affect that gate.

      # ----- Catalog repair (one-time; runs first, no-ops once clean) ---------

      - name: Repair catalog
        id: repair
        # One-time data repair: strips Lightspeed fund-badge text from names,
        # drops/excludes India-only holdings, resets parked-domain enrichments.
        # Idempotent — selects nothing once the backlog is clean, so it's safe
        # to leave in the recurring run. First because it must clean data before
        # the stages below read it (and right after migrations so the exclusion
        # columns exist).
        timeout-minutes: 15
        continue-on-error: true
        run: uv run nous repair-catalog

      - name: Normalize taxonomy
        id: normalize_taxonomy
        # Recanonicalize the two free-text taxonomy columns (primary_category +
        # industry_group) onto the committed canonical maps — a pure set-based
        # string op, no LLM. Idempotent: once every value is canonical a run
        # rewrites zero rows, so it's safe in the recurring cron. Runs here so
        # the browse filters / category pages heal in one pass instead of only
        # as the enrich stage happens to re-touch each company. A successful run
        # is id'd, so a remap that actually changes data triggers the Vercel
        # redeploy below (the dropdown is statically rendered).
        timeout-minutes: 15
        continue-on-error: true
        run: uv run nous normalize-taxonomy

      - name: Normalize hq_state
        id: normalize_hq_state
        # Canonicalize companies.hq_state to the 2-letter USPS code (zero LLM,
        # per-row). Self-bounding: selects only US-state rows that differ from
        # canonical, so once drained it rewrites nothing — safe in the recurring
        # cron. Heals full-name /location links (routing-safe; the route matches
        # the code). Bounded by --limit; id'd like normalize-taxonomy so a run
        # that actually changes data triggers the redeploy below.
        timeout-minutes: 5
        continue-on-error: true
        run: uv run nous normalize-hq-state --limit 500

      - name: Repair wrong websites
        id: repair_websites
        # Poisoned-row repair (Task 2.2 + the 2026-07-16 wrong-site cleanup):
        # reset companies whose website is a directory/aggregator/parked host,
        # whose description is parked prose or names a DIFFERENT company, and
        # delete rounds/articles mined from the wrong site itself. Was a
        # dispatch-gated one-off that never got dispatched — the 2026-07-16 QA
        # pass found month-old poisoned rows still live — so it now runs every
        # cron: idempotent, $0 (regex/heuristics, no LLM), selection self-noops
        # when nothing is poisoned. (Its former run_repair_websites input was
        # removed. A dispatch knob is now just an `overrides` allowlist entry.)
        timeout-minutes: 15
        continue-on-error: true
        run: uv run nous repair-wrong-websites

      - name: Repair duplicate funding rounds
        id: repair_dupes
        if: ${{ github.event_name == 'schedule' || env.OV_RUN_REPAIR_DUPES == 'true' }}
        # Collapse duplicate funding rounds left by multi-article re-reporting
        # (e.g. Helion's $465M Series G across 5 rows) and delete signal-free
        # empty shells (blue-origin accumulated 10 from pre-rumor-guard "seeks
        # $10B" articles — 2026-07-16 QA). Idempotent + conservative (equal
        # amounts, compatible types only), so it now runs on EVERY scheduled
        # cron in apply mode — same promotion repair-wrong-websites got in #215.
        # Manual dispatches keep the explicit gates: run_repair_dupes to run at
        # all, repair_dupes_apply=false (default) for a log-only dry-run.
        timeout-minutes: 15
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${OV_REPAIR_DUPES_APPLY:-}" = "true" ]; then
            uv run nous repair-duplicate-rounds
          else
            uv run nous repair-duplicate-rounds --dry-run
          fi

      # ----- Funding news (freshness-first) -----------------------------------

      - name: Ingest news
        id: news
        if: ${{ env.OV_SKIP_NEWS != 'true' }}
        # Per-company Google News RSS (rotates least-recently-checked first via
        # companies.news_checked_at) + the TechCrunch venture-tag broad sweep.
        # --limit 400 x 8 runs/day ≈ 3,200 companies/day, covering the ~2.6k
        # table in a single day and draining any backlog fast. Raised from 40
        # (old private-repo quota sizing) now that Actions minutes are free.
        # --lookback-days defaults to 14 (not the CLI's 7) so each per-company
        # RSS query captures two full weeks of headlines, recovering from the
        # months the robots-block hid (fixed in #54/#61).
        # The TC sweep runs every time but only LLM-identifies *new* articles.
        # continue-on-error: a transient news block shouldn't fail the run.
        timeout-minutes: 15
        continue-on-error: true
        run: |
          NEWS_LIMIT="${OV_NEWS_LIMIT:-400}"
          NEWS_LOOKBACK="${OV_NEWS_LOOKBACK_DAYS:-14}"
          uv run nous ingest-news --limit "$NEWS_LIMIT" --lookback-days "$NEWS_LOOKBACK"

      - name: Extract funding
        id: funding
        if: ${{ env.OV_SKIP_FUNDING != 'true' }}
        # Bounded by unprocessed articles, so steady-state cost tracks actual
        # new-article volume (usually a handful per run at 10x/day). --limit
        # caps the worst case; continue-on-error per the provider-rate-limit
        # logic (the next run resumes the remaining unprocessed rows).
        timeout-minutes: 15
        continue-on-error: true
        run: |
          FUNDING_LIMIT="${OV_FUNDING_LIMIT:-80}"
          uv run nous extract-funding --limit "$FUNDING_LIMIT"

      - name: Extract funding (re-query stated totals)
        id: funding_requery_totals
        if: ${{ env.OV_SKIP_FUNDING != 'true' }}
        # Periodic backfill (Task A4): re-read ALREADY-processed articles whose
        # text states a cumulative total ("to date", "total funding", ...) for
        # companies that still have no stated total, capping LLM spend with
        # --limit. Idempotent (rounds reconcile, totals apply newest-wins,
        # articles stay processed). Runs once/day on the 00:00 UTC cron — not
        # every 3h — or on demand via run_requery_totals=true. The single cron
        # string can't distinguish the hour, so we gate on the UTC hour here.
        timeout-minutes: 15
        continue-on-error: true
        run: |
          HOUR="$(date -u +%H)"
          if [ "${OV_RUN_REQUERY_TOTALS:-}" = "true" ] || [ "$HOUR" = "00" ]; then
            FUNDING_LIMIT="${OV_FUNDING_LIMIT:-80}"
            uv run nous extract-funding --limit "$FUNDING_LIMIT" --requery-totals
          else
            echo "Skipping --requery-totals (UTC hour=$HOUR, not 00 and not forced)."
          fi

      - name: Extract funding (website fallback)
        id: funding_website
        if: ${{ env.OV_SKIP_FUNDING != 'true' }}
        # Gap-fill only: companies that still have no funding rounds after the
        # news pass. Standing limit raised 100 → 300 (Task A2) to drain the
        # ~1.2k round-less backlog faster now that Actions minutes are free. At
        # ~2s/company (scrape + LLM) 300 companies ≈ 10 min.
        # The 180-day back-off means each company is normally checked once every
        # 6 months, so the per-run spend stays bounded once the backlog clears.
        # website_ignore_recheck=true (manual dispatch, Task A2) drops that
        # back-off so a single high-limit run mines EVERY round-less company's
        # own site once. The 45-min timeout gives that one-off drain headroom.
        timeout-minutes: 45
        continue-on-error: true
        run: |
          WF_LIMIT="${OV_WEBSITE_FUNDING_LIMIT:-300}"
          IGNORE_RECHECK=""
          if [ "${OV_WEBSITE_IGNORE_RECHECK:-}" = "true" ]; then
            IGNORE_RECHECK="--ignore-recheck"
          fi
          uv run nous extract-funding-website --limit "$WF_LIMIT" $IGNORE_RECHECK

      - name: Backfill funding history
        id: funding_backfill
        if: ${{ env.OV_RUN_FUNDING_BACKFILL == 'true' }}
        # One-off depth lever (Task A3): a ~5-year Google News sweep over
        # funded/notable companies, then funding-extraction over the new
        # articles, to build multi-round trajectories. Dup-safe via the
        # reconcile key (round_type + announced_date ±60d), so a re-dispatch
        # only re-pays the LLM for genuinely new rounds. Gated off by default;
        # dispatch with run_funding_backfill=true. Reuses news_limit /
        # funding_limit for the per-stage budgets (default 600 here — higher
        # than the standing per-company news limit since this is a one-off).
        timeout-minutes: 60
        continue-on-error: true
        run: |
          BF_NEWS_LIMIT="${OV_NEWS_LIMIT:-600}"
          BF_FUNDING_LIMIT="${OV_FUNDING_LIMIT:-600}"
          uv run nous backfill-funding-history \
            --news-limit "$BF_NEWS_LIMIT" --funding-limit "$BF_FUNDING_LIMIT"

      - name: Refresh latest round
        id: refresh_latest_round
        # Recompute the denormalized companies.latest_round_* columns the web
        # browse page sorts/filters on (Task C0). The extract-funding stages
        # already call this internally, but it also runs here as a cheap (one
        # set-based UPDATE, no LLM) standalone so the columns stay fresh even on
        # a descriptions-only dispatch that skips both funding stages. Always
        # runs; idempotent.
        timeout-minutes: 5
        continue-on-error: true
        run: uv run nous refresh-latest-round

      # ----- Descriptions (backlog drain + new companies) ---------------------

      - name: Resolve website fallback (husk re-mining)
        id: resolve_fallback
        # Route around the Cloudflare-403 that blocks the origin homepage scrape:
        # resolve website-less husks from sources that were never the origin site
        # (Wikidata "official website" + outbound links in already-sourced news),
        # recording a provenance source per resolved website. Runs BEFORE
        # resolve-homepages so marquee husks get a sourced website before the
        # blind TLD-guess resolver, and scrape-homepages picks them up the same
        # run. Self-bounding on its own website_fallback_checked_at stamp; $0
        # (Wikidata + news re-fetch are free). No dispatch knob (add an
        # `overrides` allowlist key if one is ever needed); the manual
        # resolve-website-fallback.yml lever covers bounded backfills/dry runs.
        timeout-minutes: 6
        continue-on-error: true
        run: uv run nous resolve-website-fallback --limit 25 --max-runtime-minutes 3

      - name: Resolve homepages
        id: resolve
        if: ${{ env.OV_SKIP_RESOLVE != 'true' }}
        # Concurrent network resolve (--concurrency 8) drains the small
        # website-less backlog fast, then no-ops. --max-runtime-minutes is a
        # clean-exit budget on top of --limit.
        timeout-minutes: 6
        continue-on-error: true
        run: |
          RESOLVE_LIMIT="${OV_RESOLVE_LIMIT:-100}"
          uv run nous resolve-homepages --limit "$RESOLVE_LIMIT" --max-runtime-minutes 2 --concurrency 8

      - name: Scrape homepages
        id: scrape
        if: ${{ env.OV_SKIP_SCRAPE != 'true' }}
        # The heaviest network stage; concurrent fetch (--concurrency 6) is what
        # makes the ~2.3k-page backlog drain in days rather than weeks. Bounded
        # by both --limit and --max-runtime-minutes.
        timeout-minutes: 8
        continue-on-error: true
        run: |
          SCRAPE_LIMIT="${OV_SCRAPE_LIMIT:-80}"
          uv run nous scrape-homepages --limit "$SCRAPE_LIMIT" --max-runtime-minutes 3 --concurrency 6

      - name: Enrich companies
        id: enrich
        if: ${{ env.OV_SKIP_ENRICH != 'true' }}
        # Write-once per company and LLM-bound, so the small --limit is the
        # spend + wall-clock governor. Since the W-F judge/describe split each
        # new company costs up to two DeepSeek calls (~10-30s), and
        # --redescribe-outdated appends a second pass (also bounded by
        # --limit) that regenerates description_long for companies described
        # by an outdated prompt revision — that ~2.6k-company backlog drains
        # at enrich_limit per run, then the pass no-ops. Timeout raised
        # 10 → 25 minutes to cover the up-to-3x call volume.
        timeout-minutes: 25
        continue-on-error: true
        run: |
          ENRICH_LIMIT="${OV_ENRICH_LIMIT:-30}"
          uv run nous enrich-companies --limit "$ENRICH_LIMIT" --redescribe-outdated

      - name: Embed companies
        id: embed
        # Wave 3 (E-1): 384-dim description embeddings via fastembed on CPU —
        # $0 LLM cost, so no skip input and no dispatch knob (add an
        # `overrides` allowlist key if ever needed). Runs right after enrich so freshly
        # (re)described companies get vectors in the same run. Idempotent via
        # embedding_text_hash: steady state selects only the ~enrich_limit
        # rows enrich just touched (seconds); the fixed --limit 200 bounds the
        # initial backlog drain, which completes in a few runs at 8 runs/day.
        # Time: ~2-4 min worst case (cold model download + 200 texts on 2
        # vCPUs); well inside the 45-min job backstop.
        timeout-minutes: 10
        continue-on-error: true
        run: uv run nous embed-companies --limit 200

      - name: Enrich backfill (missing taxonomy)
        id: enrich_backfill
        if: ${{ env.OV_RUN_ENRICH_BACKFILL == 'true' }}
        # One-off backfill: re-enriches companies that have a description but
        # NULL industry_group, making them competitor-eligible. Gated off by
        # default; dispatch with run_enrich_backfill=true to run.
        timeout-minutes: 20
        continue-on-error: true
        run: uv run nous enrich-companies --backfill-missing-taxonomy --limit "${OV_ENRICH_BACKFILL_LIMIT:-300}"

      - name: Judge eligibility
        id: judge
        # Backfills the is-this-a-startup / non-US judgment onto companies
        # enriched before that judgment existed (~1,600 one-time DeepSeek calls).
        # Each judged row is stamped, so this drains in a couple of weeks at 10x/
        # day and then no-ops. Runs after enrich so freshly described rows are
        # already stamped by enrich itself and skipped here. Timeout raised to
        # 45m so a high judge_limit can drain the one-time backlog in a single
        # dispatch (each row is stamped as it's judged, so a timeout mid-drain
        # still preserves progress).
        timeout-minutes: 45
        continue-on-error: true
        run: |
          JUDGE_LIMIT="${OV_JUDGE_LIMIT:-30}"
          REJUDGE=""
          if [ "${OV_RUN_REJUDGE_NONSTARTUP:-}" = "true" ]; then
            # One-time backfill sweep (runbook: non-us-and-nonstartup-backfill):
            # resets the judged stamp on included rows whose description matches
            # a non-startup prose signal, so this same bounded run re-judges
            # them with the tightened prompt. Idempotent; never un-excludes.
            REJUDGE="--rejudge-nonstartup-signals"
          fi
          uv run nous judge-eligibility --limit "$JUDGE_LIMIT" $REJUDGE

      - name: Verify sources
        id: verify_sources
        # Discriminative source-verification (the "✓ Verified against source"
        # feature, #197–#201): checks up to 40 stored-text facts per run
        # against their cited sources and upserts verdicts into
        # fact_verifications. Selection is version+source-gated NOT EXISTS
        # (idempotent, never re-bills a verified fact), so steady state is a
        # handful of new/changed facts per run (~$0.0004/fact ≈ $0.02 max);
        # the one-time stored-text backlog drains here in a few runs. Runs
        # after judge so facts extracted earlier in this run verify in the
        # same pass. No dispatch knob (an `overrides` allowlist key away if
        # needed); the manual verify-sources.yml lever covers backfills/dry runs.
        timeout-minutes: 15
        continue-on-error: true
        # --refetch: the stored-text pool drained 2026-07-17, so steady state
        # is a handful of new facts per run; refetch-bucket facts get ONE
        # polite transient live fetch each (robots/UA/throttle/SSRF inside the
        # stage; text never persisted). Bounded by the same --limit.
        run: uv run nous verify-sources --limit 40 --refetch

      - name: Infer HQ country (non-US detection backfill)
        if: ${{ env.OV_RUN_INFER_COUNTRY == 'true' }}
        # Dispatch-gated repair: fetch about/contact/legal pages for shown
        # companies with NULL hq_country and soft-exclude non-US ones, sourced.
        # Dry-run by default (preview the intended exclusions in the logs); set
        # infer_country_apply=true to write. Heaviest per-company stage
        # (<=~8 fetches + 1 DeepSeek call), so it is never on the cron.
        timeout-minutes: 30
        continue-on-error: true
        run: |
          LIMIT="${OV_INFER_COUNTRY_LIMIT:-40}"
          if [ "${OV_INFER_COUNTRY_APPLY:-}" = "true" ]; then
            uv run nous infer-hq-country --limit "$LIMIT"
          else
            uv run nous infer-hq-country --limit "$LIMIT" --dry-run
          fi

      - name: Database stats
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous db-stats

      - name: Data quality
        # Read-only completeness report (field %s, website provenance, the
        # per-company completeness-score distribution, duplicate rate,
        # staleness) → step summary. The instrument panel for the data-quality
        # horizon. Always runs; id-free so it can't trigger the Vercel deploy.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous data-quality

      - name: Trigger Vercel deploy
        # Fires when at least one id'd pipeline stage above succeeded. Only the
        # pipeline stages carry ids in this file — keep it that way or scope this
        # back to an explicit list.
        if: ${{ !cancelled() && contains(steps.*.outcome, 'success') }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy hook."
            exit 0
          fi
          curl -fsS -m 30 --retry 3 -o /dev/null -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            && echo "Vercel deploy hook triggered." \
            || echo "::warning::Vercel deploy hook POST failed (non-fatal)"

      # NOTE: Pipeline health + the failure alert run AFTER the deploy gate
      # on purpose — health carries an id (the alert keys on its outcome),
      # and an id'd always-success step BEFORE the gate would satisfy
      # contains(steps.*.outcome, 'success') on every run.
      - name: Pipeline health
        id: health
        # Always runs (even if earlier stages failed) so every pipeline run gets
        # a health annotation in the Actions UI.  Exits 0 — never blocks the
        # pipeline.  Emits ::warning:: / ::error:: annotations and a step-summary
        # markdown table for any stage that logged status='empty' or 'error'.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous pipeline-health --strict-errors

      - name: Alert on failure (GitHub issue)
        # Fires when the job itself failed OR pipeline-health saw a stage with
        # status='error' (the health step is continue-on-error + strict-errors,
        # so its OUTCOME carries the signal while the job stays green).
        # Deduped: one open pipeline-failure issue per workflow collects
        # comments until it is closed — closing it re-arms a fresh alert.
        # `empty` statuses stay step-summary warnings, never issues.
        if: ${{ !cancelled() && (failure() || steps.health.outcome == 'failure') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create pipeline-failure --color D93F0B \
            --description "Automated: a pipeline workflow failed or a stage logged status=error" \
            --force
          TITLE="Pipeline failure: ${{ github.workflow }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="Automated alert: [run ${{ github.run_id }}]($RUN_URL) (\`${{ github.event_name }}\`) failed or a stage logged status=error — see that run's pipeline-health step summary for the stage table. Later failures comment on this issue until it is closed."
          existing=$(gh issue list --state open --label pipeline-failure \
            --json number,title --jq "[.[] | select(.title == \"$TITLE\")][0].number // empty")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$BODY"
          else
            gh issue create --title "$TITLE" --label pipeline-failure --body "$BODY"
          fi

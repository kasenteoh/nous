name: pipeline

# Consolidated scraping pipeline — funding news + company descriptions — run
# 8x/day (every 3h). Replaces the separate daily descriptions.yml + funding-news.yml.
#
# One workflow (not two) keeps the cadence to a single cron + a single deploy
# gate and shares the Playwright cache across runs.
#
# The repo is PUBLIC, so GitHub-hosted Actions minutes are FREE and unlimited —
# the old private-repo 2,000-min/mo quota no longer binds. The remaining bounds
# are per-run wall clock, DeepSeek $ (each LLM stage is --limit-capped; cost
# shows in the telemetry step summary), and scraping politeness (1 req/sec per
# domain). The conservative per-run --limits below were sized for the old quota
# and can now be raised to drain backlogs faster.
#
# Why frequent runs stay cheap regardless: every stage is idempotent and resumes
# where the last run stopped (per-company commits + write-once timestamps + the
# `processed` flag), so repeated runs re-pay almost nothing —
#   * ingest-news only LLM-identifies *new* TechCrunch articles and stores Google
#     News headlines for the per-company rotation (least-recently-checked first);
#   * extract-funding only touches unprocessed articles;
#   * enrich-companies is write-once per company.
# The initial backlog drains in a few days thanks to the concurrent fetch in
# resolve/scrape (--concurrency); steady-state runs then no-op in minutes.
on:
  schedule:
    # 8x/day, every 3h. Serialized against discovery.yml (weekly Mon 02:00) via
    # the shared `concurrency` group; on Mondays the 00:00/03:00 runs queue
    # behind discovery (cancel-in-progress: false → they wait, never drop).
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:
    inputs:
      skip_news:
        description: "Skip the Ingest news stage."
        required: false
        type: boolean
        default: false
      skip_funding:
        description: "Skip the Extract funding (news + website) stages."
        required: false
        type: boolean
        default: false
      skip_resolve:
        description: "Skip the Resolve homepages stage."
        required: false
        type: boolean
        default: false
      skip_scrape:
        description: "Skip the Scrape homepages stage."
        required: false
        type: boolean
        default: false
      skip_enrich:
        description: "Skip the Enrich companies stage."
        required: false
        type: boolean
        default: false
      news_limit:
        description: "Ingest news: max companies for the per-company RSS rotation. Default: 400."
        required: false
        type: string
      news_lookback_days:
        description: "Ingest news: lookback window in days. Default: 14."
        required: false
        type: string
      funding_limit:
        description: "Extract funding: max unprocessed articles per run. Default: 80."
        required: false
        type: string
      website_funding_limit:
        description: "Website funding gap-fill: max companies per run. Default: 300."
        required: false
        type: string
      website_ignore_recheck:
        description: "Website funding drain (Task A2): ignore the 180-day back-off and mine EVERY round-less company's own site once. Pair with a high website_funding_limit. Default: false."
        required: false
        type: boolean
        default: false
      resolve_limit:
        description: "Resolve: max companies to attempt. Default: 100."
        required: false
        type: string
      scrape_limit:
        description: "Scrape: max companies to scrape. Default: 80."
        required: false
        type: string
      enrich_limit:
        description: "Enrich: max companies to enrich (caps LLM spend). Default: 30."
        required: false
        type: string
      judge_limit:
        description: "Judge eligibility: max companies to judge this run (drains the backlog). Default: 30."
        required: false
        type: string
      run_repair_websites:
        description: "Run the one-off repair-wrong-websites poisoned-row cleanup (Task 2.2). Default: false."
        required: false
        type: boolean
        default: false
      run_funding_backfill:
        description: "Run backfill-funding-history (Task A3): long-lookback Google News sweep over funded/notable companies, then extract-funding, for multi-round trajectories. Default: false."
        required: false
        type: boolean
        default: false

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). resolve / enrich UPDATE company rows and ingest-news /
# extract-funding INSERT them, all of which race the dedup DELETEs in
# discovery.yml. cancel-in-progress: false so a queued run waits its turn — and
# so two pipeline runs (10x/day) never overlap each other either.
permissions:
  contents: read

concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Hard backstop. The per-stage --limit / --max-runtime budgets keep a
    # healthy run well under this; hitting it means a stage hung, and the next
    # run (≤~2.4h later) resumes cleanly. Far below GitHub's 360-min kill, and
    # much tighter than the old 150 (10x/day runs must stay short).
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          # Playwright caches Chromium under ~/.cache/ms-playwright. Pinning by
          # the lockfile gives a clean cache-busting signal on dep bumps. The
          # restore-key keeps the cache warm across the 10 daily runs so only
          # the first run after a bump re-downloads Chromium.
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pipeline/uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # `--with-deps` would also install OS-level libs (libnss3 etc.) but
        # GitHub-hosted ubuntu-latest already ships them, so skip the apt step.
        run: uv run playwright install chromium

      - name: Apply migrations
        run: uv run alembic upgrade head

      # Every stage below is continue-on-error so one stage failing or hanging
      # never blocks the later ones — idempotent stages make "skip now, catch up
      # next run" safe. Stages carry an `id` so the deploy gate at the bottom
      # (contains(steps.*.outcome, 'success')) can see them; db-stats and the
      # deploy step are intentionally id-free so they can't affect that gate.

      # ----- Catalog repair (one-time; runs first, no-ops once clean) ---------

      - name: Repair catalog
        id: repair
        # One-time data repair: strips Lightspeed fund-badge text from names,
        # drops/excludes India-only holdings, resets parked-domain enrichments.
        # Idempotent — selects nothing once the backlog is clean, so it's safe
        # to leave in the recurring run. First because it must clean data before
        # the stages below read it (and right after migrations so the exclusion
        # columns exist).
        timeout-minutes: 15
        continue-on-error: true
        run: uv run nous repair-catalog

      - name: Repair wrong websites
        id: repair_websites
        if: ${{ inputs.run_repair_websites == true }}
        # One-off (Task 2.2): reset companies whose website is a directory/
        # aggregator/parked host or whose description is parked prose, and
        # re-queue false exclusions, so the hardened resolver re-resolves them
        # cleanly on the next run. Gated off by default; dispatch with
        # run_repair_websites=true to apply the cleanup once.
        timeout-minutes: 15
        continue-on-error: true
        run: uv run nous repair-wrong-websites

      # ----- Funding news (freshness-first) -----------------------------------

      - name: Ingest news
        id: news
        if: ${{ inputs.skip_news != true }}
        # Per-company Google News RSS (rotates least-recently-checked first via
        # companies.news_checked_at) + the TechCrunch venture-tag broad sweep.
        # --limit 400 x 8 runs/day ≈ 3,200 companies/day, covering the ~2.6k
        # table in a single day and draining any backlog fast. Raised from 40
        # (old private-repo quota sizing) now that Actions minutes are free.
        # --lookback-days defaults to 14 (not the CLI's 7) so each per-company
        # RSS query captures two full weeks of headlines, recovering from the
        # months the robots-block hid (fixed in #54/#61).
        # The TC sweep runs every time but only LLM-identifies *new* articles.
        # continue-on-error: a transient news block shouldn't fail the run.
        timeout-minutes: 15
        continue-on-error: true
        run: |
          NEWS_LIMIT="${{ inputs.news_limit }}"
          if [ -z "$NEWS_LIMIT" ]; then NEWS_LIMIT=400; fi
          NEWS_LOOKBACK="${{ inputs.news_lookback_days }}"
          if [ -z "$NEWS_LOOKBACK" ]; then NEWS_LOOKBACK=14; fi
          uv run nous ingest-news --limit "$NEWS_LIMIT" --lookback-days "$NEWS_LOOKBACK"

      - name: Extract funding
        id: funding
        if: ${{ inputs.skip_funding != true }}
        # Bounded by unprocessed articles, so steady-state cost tracks actual
        # new-article volume (usually a handful per run at 10x/day). --limit
        # caps the worst case; continue-on-error per the provider-rate-limit
        # logic (the next run resumes the remaining unprocessed rows).
        timeout-minutes: 15
        continue-on-error: true
        run: |
          FUNDING_LIMIT="${{ inputs.funding_limit }}"
          if [ -z "$FUNDING_LIMIT" ]; then FUNDING_LIMIT=80; fi
          uv run nous extract-funding --limit "$FUNDING_LIMIT"

      - name: Extract funding (website fallback)
        id: funding_website
        if: ${{ inputs.skip_funding != true }}
        # Gap-fill only: companies that still have no funding rounds after the
        # news pass. Standing limit raised 100 → 300 (Task A2) to drain the
        # ~1.2k round-less backlog faster now that Actions minutes are free. At
        # ~2s/company (scrape + LLM) 300 companies ≈ 10 min.
        # The 180-day back-off means each company is normally checked once every
        # 6 months, so the per-run spend stays bounded once the backlog clears.
        # website_ignore_recheck=true (manual dispatch, Task A2) drops that
        # back-off so a single high-limit run mines EVERY round-less company's
        # own site once. The 45-min timeout gives that one-off drain headroom.
        timeout-minutes: 45
        continue-on-error: true
        run: |
          WF_LIMIT="${{ inputs.website_funding_limit }}"
          if [ -z "$WF_LIMIT" ]; then WF_LIMIT=300; fi
          IGNORE_RECHECK=""
          if [ "${{ inputs.website_ignore_recheck }}" = "true" ]; then
            IGNORE_RECHECK="--ignore-recheck"
          fi
          uv run nous extract-funding-website --limit "$WF_LIMIT" $IGNORE_RECHECK

      - name: Backfill funding history
        id: funding_backfill
        if: ${{ inputs.run_funding_backfill == true }}
        # One-off depth lever (Task A3): a ~5-year Google News sweep over
        # funded/notable companies, then funding-extraction over the new
        # articles, to build multi-round trajectories. Dup-safe via the
        # reconcile key (round_type + announced_date ±60d), so a re-dispatch
        # only re-pays the LLM for genuinely new rounds. Gated off by default;
        # dispatch with run_funding_backfill=true. Reuses news_limit /
        # funding_limit for the per-stage budgets (default 600 here — higher
        # than the standing per-company news limit since this is a one-off).
        timeout-minutes: 60
        continue-on-error: true
        run: |
          BF_NEWS_LIMIT="${{ inputs.news_limit }}"
          if [ -z "$BF_NEWS_LIMIT" ]; then BF_NEWS_LIMIT=600; fi
          BF_FUNDING_LIMIT="${{ inputs.funding_limit }}"
          if [ -z "$BF_FUNDING_LIMIT" ]; then BF_FUNDING_LIMIT=600; fi
          uv run nous backfill-funding-history \
            --news-limit "$BF_NEWS_LIMIT" --funding-limit "$BF_FUNDING_LIMIT"

      # ----- Descriptions (backlog drain + new companies) ---------------------

      - name: Resolve homepages
        id: resolve
        if: ${{ inputs.skip_resolve != true }}
        # Concurrent network resolve (--concurrency 8) drains the small
        # website-less backlog fast, then no-ops. --max-runtime-minutes is a
        # clean-exit budget on top of --limit.
        timeout-minutes: 6
        continue-on-error: true
        run: |
          RESOLVE_LIMIT="${{ inputs.resolve_limit }}"
          if [ -z "$RESOLVE_LIMIT" ]; then RESOLVE_LIMIT=100; fi
          uv run nous resolve-homepages --limit "$RESOLVE_LIMIT" --max-runtime-minutes 2 --concurrency 8

      - name: Scrape homepages
        id: scrape
        if: ${{ inputs.skip_scrape != true }}
        # The heaviest network stage; concurrent fetch (--concurrency 6) is what
        # makes the ~2.3k-page backlog drain in days rather than weeks. Bounded
        # by both --limit and --max-runtime-minutes.
        timeout-minutes: 8
        continue-on-error: true
        run: |
          SCRAPE_LIMIT="${{ inputs.scrape_limit }}"
          if [ -z "$SCRAPE_LIMIT" ]; then SCRAPE_LIMIT=80; fi
          uv run nous scrape-homepages --limit "$SCRAPE_LIMIT" --max-runtime-minutes 3 --concurrency 6

      - name: Enrich companies
        id: enrich
        if: ${{ inputs.skip_enrich != true }}
        # Write-once per company and LLM-bound (sequential ~5-15s/company), so
        # the small --limit is the spend + wall-clock governor. At 10x/day this
        # keeps pace with the day's scrape yield; the backlog drains over days.
        timeout-minutes: 10
        continue-on-error: true
        run: |
          ENRICH_LIMIT="${{ inputs.enrich_limit }}"
          if [ -z "$ENRICH_LIMIT" ]; then ENRICH_LIMIT=30; fi
          uv run nous enrich-companies --limit "$ENRICH_LIMIT"

      - name: Judge eligibility
        id: judge
        # Backfills the is-this-a-startup / non-US judgment onto companies
        # enriched before that judgment existed (~1,600 one-time DeepSeek calls).
        # Each judged row is stamped, so this drains in a couple of weeks at 10x/
        # day and then no-ops. Runs after enrich so freshly described rows are
        # already stamped by enrich itself and skipped here. Timeout raised to
        # 45m so a high judge_limit can drain the one-time backlog in a single
        # dispatch (each row is stamped as it's judged, so a timeout mid-drain
        # still preserves progress).
        timeout-minutes: 45
        continue-on-error: true
        run: |
          JUDGE_LIMIT="${{ inputs.judge_limit }}"
          if [ -z "$JUDGE_LIMIT" ]; then JUDGE_LIMIT=30; fi
          uv run nous judge-eligibility --limit "$JUDGE_LIMIT"

      - name: Database stats
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous db-stats

      - name: Pipeline health
        # Always runs (even if earlier stages failed) so every pipeline run gets
        # a health annotation in the Actions UI.  Exits 0 — never blocks the
        # pipeline.  Emits ::warning:: / ::error:: annotations and a step-summary
        # markdown table for any stage that logged status='empty' or 'error'.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous pipeline-health

      - name: Trigger Vercel deploy
        # Fires when at least one id'd pipeline stage above succeeded. Only the
        # pipeline stages carry ids in this file — keep it that way or scope this
        # back to an explicit list.
        if: ${{ !cancelled() && contains(steps.*.outcome, 'success') }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy hook."
            exit 0
          fi
          curl -fsS -m 30 --retry 3 -o /dev/null -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            && echo "Vercel deploy hook triggered." \
            || echo "::warning::Vercel deploy hook POST failed (non-fatal)"

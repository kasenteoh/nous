name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Secret-scanning gate: fails the build if a secret is committed anywhere in
  # history. False positives are suppressed by exact fingerprint in
  # .gitleaksignore (never by path/pattern — see .gitleaks.toml). The same scan
  # is available locally as an opt-in pre-commit hook (.pre-commit-config.yaml).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -v -rs

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (also typechecks)
        # The canary values below are FAKE (this job has no real secrets — see
        # the smoke-test comment). They exist so the bundle-safety step can
        # prove no build path inlines or serializes a server secret into a
        # client-visible artifact. Only the key/DB URL are planted: SUPABASE_URL
        # stays unset so lib/db.ts keeps taking its "not configured" path and
        # the build behaves exactly like the secret-free contract expects.
        env:
          SUPABASE_SERVICE_ROLE_KEY: nous-ci-canary-service-role-key-not-a-real-secret
          DATABASE_URL: postgresql+psycopg://canary:nous-ci-canary-db-password@canary.invalid:5432/canary
        run: npm run build

      - name: Client-bundle safety (no server secrets reach the browser)
        # Must run with the same env as the build so the canary *values* are
        # scanned for, in addition to the server-only identifier names.
        env:
          SUPABASE_SERVICE_ROLE_KEY: nous-ci-canary-service-role-key-not-a-real-secret
          DATABASE_URL: postgresql+psycopg://canary:nous-ci-canary-db-password@canary.invalid:5432/canary
        run: npm run check:bundle

      # Release-blocking route smoke (Task B3 / Phase 7.2). CI has no Supabase
      # secrets, so SMOKE_HAS_DATA is intentionally unset: the harness runs its
      # structural block only (routes return 200/404, masthead + landmarks
      # render, excluded/unknown slugs 404) and skips the data-backed checks.
      # This guards the Phase-1 web states (pagination clamp, excluded-404)
      # without needing prod credentials.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test (Playwright)
        run: npm run test:e2e

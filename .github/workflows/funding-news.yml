name: funding-news

# Daily funding + news refresh: pull funding-keyword news (per-company Google
# News RSS + TechCrunch venture-tag broad sweep), then extract structured
# rounds / investors via the LLM. Runs daily so newly announced rounds surface
# fast. extract-funding only processes unprocessed articles, so steady-state
# daily spend is bounded by actual daily article volume. No browser needed:
# ingest-news fetches RSS and extract-funding-website reads already-scraped
# raw_pages, so the Playwright install (present in descriptions.yml) is omitted.
on:
  schedule:
    # Daily 14:00 UTC, offset from the morning discovery/descriptions slots.
    # On Mondays this run queues behind those jobs via the shared
    # `concurrency` group below — that's the intended serialization, and their
    # bounded budgets (≤~1.5h each) mean the queue clears hours before 14:00.
    # Note: this file landed on main 2026-06-11 16:43 UTC, after that day's
    # 14:00 slot — the first scheduled run is 2026-06-12.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      skip_news:
        description: "Skip the Ingest news stage."
        required: false
        type: boolean
        default: false
      skip_funding:
        description: "Skip the Extract funding stage."
        required: false
        type: boolean
        default: false
      news_lookback_days:
        description: "Ingest news: lookback window in days. Default: 7."
        required: false
        type: string
      news_limit:
        description: "Ingest news: max companies for the per-company RSS rotation. Default: 400."
        required: false
        type: string
      website_funding_limit:
        description: "Website funding gap-fill: max companies per run. Default: 150."
        required: false
        type: string

# Serialize against every other workflow that mutates the companies table (see
# discovery.yml). ingest-news auto-creates companies from the TechCrunch sweep
# and extract-funding writes funding rows, both of which race the dedup DELETEs
# in discovery.yml. cancel-in-progress: false so a queued run waits its turn.
concurrency:
  group: nous-pipeline-db
  cancel-in-progress: false

jobs:
  funding-news:
    runs-on: ubuntu-latest
    # Hard backstop far below GitHub's 360-min kill. ingest-news is bounded by
    # company count × RSS fetch, extract-funding by --limit 1000 LLM calls.
    timeout-minutes: 150
    defaults:
      run:
        working-directory: pipeline
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      # All LLM calls run on DeepSeek (see pipeline Settings).
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Ingest news
        id: news
        if: ${{ inputs.skip_news != true }}
        # Per-company Google News RSS + TechCrunch venture-tag broad sweep.
        # --limit rotates the per-company sweep (least-recently-checked first,
        # via companies.news_checked_at): 400/day over ~2.6k companies covers
        # the whole table within the 7-day lookback window while keeping the
        # daily Google News request count polite and the runner time ~10 min
        # (2.6k unrotated queries would take 45+ min/day — a third of the
        # private-repo Actions quota). continue-on-error: a transient Google
        # News block shouldn't fail the run.
        timeout-minutes: 30
        continue-on-error: true
        run: |
          NEWS_LIMIT="${{ inputs.news_limit }}"
          if [ -z "$NEWS_LIMIT" ]; then NEWS_LIMIT=400; fi
          ARGS=(--limit "$NEWS_LIMIT")
          if [ -n "${{ inputs.news_lookback_days }}" ]; then
            ARGS+=(--lookback-days "${{ inputs.news_lookback_days }}")
          fi
          uv run nous ingest-news "${ARGS[@]}"

      - name: Extract funding
        id: funding
        if: ${{ inputs.skip_funding != true }}
        # --limit 1000 caps per-run LLM spend on DeepSeek (now a daily ceiling).
        # Bounded by unprocessed articles, so steady-state cost tracks actual
        # news volume. continue-on-error per the same rate-limit logic as
        # enrich-companies.
        timeout-minutes: 60
        continue-on-error: true
        run: uv run nous extract-funding --limit 1000

      - name: Extract funding (website fallback)
        id: funding_website
        if: ${{ inputs.skip_funding != true }}
        # Gap-fill only: runs for companies that still have no funding rounds
        # after the TechCrunch/news pass above, so TechCrunch stays primary.
        # --limit + the website_funding_checked_at rotation (180-day back-off,
        # stamped even on "no funding found") bound the daily LLM spend —
        # without them every scraped-but-roundless company (most of the
        # table) would be re-LLM'd every single day.
        timeout-minutes: 30
        continue-on-error: true
        run: |
          WF_LIMIT="${{ inputs.website_funding_limit }}"
          if [ -z "$WF_LIMIT" ]; then WF_LIMIT=150; fi
          uv run nous extract-funding-website --limit "$WF_LIMIT"

      - name: Database stats
        # No step id — contains(steps.*.outcome, ...) on the Trigger step only
        # sees id'd steps; leaving this id-free means it cannot accidentally
        # affect deploy gating.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: uv run nous db-stats

      - name: Trigger Vercel deploy
        # contains(steps.*.outcome, ...) covers every id'd step; only pipeline
        # stages carry ids in this file — keep it that way or scope this back
        # to an explicit list.
        if: ${{ !cancelled() && contains(steps.*.outcome, 'success') }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping deploy hook."
            exit 0
          fi
          curl -fsS -m 30 --retry 3 -o /dev/null -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            && echo "Vercel deploy hook triggered." \
            || echo "::warning::Vercel deploy hook POST failed (non-fatal)"

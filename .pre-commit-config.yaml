# Opt-in pre-commit hooks (CI enforces the same gitleaks scan in lint.yml, so
# this is a fast local guard, not the source of truth). One-time setup:
#
#   brew install pre-commit   # or: uv tool install pre-commit / pipx install pre-commit
#   pre-commit install
#
# After that, gitleaks runs on staged changes at every commit. See README
# "Secret hygiene" for details.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
